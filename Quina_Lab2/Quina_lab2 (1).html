<!DOCTYPE html>
<html>
    <head>
        <title>HTML Restaurant</title>
        <style>
            p {
                margin: 0;
            }
        </style>
    </head>
    <body>
        <form>
        <h1>HTML Restaurant</h1>
        <p>Name:</p>
        <input type="text" required><br><br>

        <p>Email:</p>
        <input type="email" required><br><br>

        <p>Phone No:</p>
        <input type="tel" required><br><br>

        <p>Date:</p>
        <input type="date" required><br><br>

        <p>How many persons will be with you?</p>
        <input type="number" required><br><br>

        <p>Notes:</p>
        <input type="text" required><br><br>

        <p>Entry:</p>
        <input type="text" required><br><br>


        <input type="submit">
        </form>
    </body>
</html>
